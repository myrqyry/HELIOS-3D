site_name: HELIOS-3D
site_description: Spintronic Coprocessor Architecture Research Hypothesis
repo_url: https://github.com/myrqyry/HELIOS-3D
repo_name: myrqyry/HELIOS-3D
edit_uri: edit/main/docs/
nav:
  - Home: index.md
  - Established Basis:
      - Abstract & Overview: ABSTRACT.md
      - Candidate Materials: CANDIDATE_MATERIALS_AND_MECHANISMS.md
      - Literature Review: LITERATURE_REVIEW.md
      - Mathematics: MATHEMATICS.md
      - Glossary: GLOSSARY.md
  - Current Demonstrator Path:
      - Alternative Materials: ALTERNATIVE_MATERIALS_AND_METHODS.md
      - Open Questions: OPEN_QUESTIONS.md
      - Targets & Comparators: TARGETS_COMPARATORS_AND_PROJECTIONS.md
      - Claims Matrix: CLAIMS_MATRIX.md
  - Speculative Long-Range Branch:
      - Core Architecture: CORE_ARCHITECTURE.md
      - Proposed Fabrication: PROPOSED_FABRICATION_PATH_AND_CONTROL.md
      - Defensive Framework: DEFENSIVE_FRAMEWORK.md
      - Pitch Deck: PITCH_DECK_OUTLINE.md
  - Project Ops:
      - Deploy to GitHub Pages: DEPLOYMENT.md
theme:
  name: material
  palette:
    primary: deep orange
    accent: amber
markdown_extensions:
  - attr_list
  - pymdownx.arithmatex:
      generic: true

validation:
  omitted_files: ignore

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
