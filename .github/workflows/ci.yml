name: repo-quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install -U pip uv

      - name: Sync dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest

      - name: Run claim validation
        run: uv run python scripts/check_claims.py

      - name: Run ERC data validation
        run: uv run python analysis/validate_erc_data.py

      - name: Run link validation
        run: uv run python scripts/check_links.py

      - name: Build docs (strict)
        run: uv run mkdocs build --strict

      - name: Check simulation syntax
        run: uv run python scripts/check_simulations.py

      - name: Check for placeholder simulations
        run: make check-stubs
